<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHEILA ON7 POLIPONI.ID</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* BODY POLOS */
body {
  background: #ffffff;
}

/* GRID LANGSUNG DI CONTAINER (BIAR KELIHATAN) */
.container {
  max-width: 430px;
  margin: auto;
  min-height: 100vh;

  background-color: #eeeeee;
  background-image:
    linear-gradient(#cfcfcf 1px, transparent 1px),
    linear-gradient(90deg, #cfcfcf 1px, transparent 1px);
  background-size: 30px 30px;

  overflow: hidden;
}

/* SEMUA KONTEN KITA KASIH CARD */
.inner {
  background: #1a1a1a;
  min-height: 100vh;
}

.banner img {
  width: 100%;
  display: block;
}

.content {
  padding: 20px;
}

.title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 15px;
  text-align: center;
  color: #ffd700;
}

.ticket-box {
  background: #242424;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 20px;
  border: 2px solid #ffd700;
}

.ticket-box h3 {
  margin-bottom: 12px;
  color: #ffd700;
}

.ticket {
  background: #111;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid #333;
}

.ticket-name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 6px;
  color: #fff;
}

.price {
  color: #00ff99;
  font-size: 18px;
  font-weight: bold;
}

.limit {
  margin-top: 10px;
  font-size: 14px;
  color: #ccc;
}

label {
  display: block;
  margin-top: 15px;
  margin-bottom: 6px;
  font-weight: bold;
  color: #fff;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
  font-size: 15px;
}

.total-box {
  background: #111;
  border: 2px dashed #ffd700;
  padding: 15px;
  border-radius: 14px;
  margin-top: 20px;
  text-align: center;
  color: #fff;
}

.total-box h2 {
  color: #00ff99;
  margin-top: 8px;
}

.qris {
  margin-top: 20px;
  text-align: center;
}

.qris img {
  width: 100%;
  border-radius: 20px;
  border: 3px solid #ffd700;
  background: white;
  padding: 10px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #ffd700, #ffb700);
  color: black;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">
  <div class="inner">

    <div class="banner">
      <img src="GANTI-DENGAN-GAMBAR-EVENT-ANDA.jpg">
    </div>

    <div class="content">
      <div class="title">PEMBELIAN TIKET EVENT</div>

      <div class="ticket-box">
        <h3>DAFTAR TIKET</h3>

        <div class="ticket">
          <div class="ticket-name">PREMIUM</div>
          <div class="price">Rp. 400.000</div>
        </div>

        <div class="ticket">
          <div class="ticket-name">FAST TRACK</div>
          <div class="price">Rp. 600.000</div>
        </div>

        <div class="limit">
          Maksimal pembelian tiket: <b>10 tiket</b>
        </div>
      </div>

      <label>Nama Lengkap</label>
      <input type="text">

      <label>E-mail</label>
      <input type="email">

      <label>Pilih Tiket</label>
      <select>
        <option>PREMIUM - Rp. 400.000</option>
        <option>FAST TRACK - Rp. 600.000</option>
      </select>

      <label>Jumlah Tiket</label>
      <input type="number" value="1">

      <div class="total-box">
        TOTAL PEMBAYARAN
        <h2>Rp. 400.000</h2>
      </div>

      <div class="qris">
        <img src="GANTI-DENGAN-QRIS-ANDA.png">
      </div>

      <button class="btn">BELI SEKARANG</button>

    </div>
  </div>
</div>

</body>
</html>
