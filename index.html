<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHEILA ON7 POLIPONI.ID</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      color: #111;

      /* GRID PUTIH HALUS */
      background-color: #ffffff;
      background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 35px 35px;
    }

    .container {
      max-width: 430px;
      margin: auto;
      min-height: 100vh;

      /* CARD UTAMA */
      background: rgba(23,23,23,0.95);
      overflow: hidden;
      backdrop-filter: blur(3px);
    }

    .banner img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
      color: #ffd700;
    }

    .ticket-box {
      background: #242424;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 20px;
      border: 2px solid #ffd700;
    }

    .ticket-box h3 {
      margin-bottom: 12px;
      color: #ffd700;
    }

    .ticket {
      background: #111;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #333;
    }

    .ticket-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    .price {
      color: #00ff99;
      font-size: 18px;
      font-weight: bold;
    }

    .limit {
      margin-top: 10px;
      font-size: 14px;
      color: #ccc;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #fff;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
    }

    .total-box {
      background: #111;
      border: 2px dashed #ffd700;
      padding: 15px;
      border-radius: 14px;
      margin-top: 20px;
      text-align: center;
      color: #fff;
    }

    .total-box h2 {
      color: #00ff99;
      margin-top: 8px;
    }

    .qris {
      margin-top: 20px;
      text-align: center;
    }

    .qris img {
      width: 100%;
      border-radius: 20px;
      border: 3px solid #ffd700;
      background: white;
      padding: 10px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ffd700, #ffb700);
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #333;
      border-top: 8px solid #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .loading p {
      margin-top: 20px;
      font-size: 18px;
      color: white;
    }

    .success {
      display: none;
      margin-top: 20px;
      background: #003b22;
      border: 1px solid #00ff99;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      color: #00ff99;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="banner">
    <img src="GANTI-DENGAN-GAMBAR-EVENT-ANDA.jpg" alt="Banner Event">
  </div>

  <div class="content">
    <div class="title">PEMBELIAN TIKET EVENT</div>

    <div class="ticket-box">
      <h3>DAFTAR TIKET</h3>

      <div class="ticket">
        <div class="ticket-name">PREMIUM</div>
        <div class="price">Rp. 400.000</div>
      </div>

      <div class="ticket">
        <div class="ticket-name">FAST TRACK</div>
        <div class="price">Rp. 600.000</div>
      </div>

      <div class="limit">
        Maksimal pembelian tiket: <b>10 tiket</b>
      </div>
    </div>

    <label>Nama Lengkap</label>
    <input type="text" id="nama">

    <label>E-mail</label>
    <input type="email" id="email">

    <label>Pilih Tiket</label>
    <select id="ticketType" onchange="hitungTotal()">
      <option value="400000">PREMIUM - Rp. 400.000</option>
      <option value="600000">FAST TRACK - Rp. 600.000</option>
    </select>

    <label>Jumlah Tiket</label>
    <input type="number" id="jumlah" min="1" max="10" value="1" onchange="hitungTotal()">

    <div class="total-box">
      TOTAL PEMBAYARAN
      <h2 id="totalHarga">Rp. 400.000</h2>
    </div>

    <div class="qris">
      <img src="GANTI-DENGAN-QRIS-ANDA.png">
    </div>

    <button class="btn" onclick="prosesPembelian()">BELI SEKARANG</button>

    <div class="success" id="successBox">
      Pembayaran berhasil diverifikasi!
    </div>
  </div>
</div>

</body>
</html>
